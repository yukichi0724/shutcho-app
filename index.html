<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しゅっちょーアプリ</title>

<style>

body{
    margin:0;
    background:#f5f5f7;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
    background:#007AFF;
    color:white;
    padding:25px;
    font-size:30px;
    font-weight:bold;
    text-align:center;
}

.container{
    padding:18px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.02);
}

.small{
    font-size:15px;
    color:#666;
    margin-top:8px;
}

</style>

</head>

<body>

<header>
🚄 しゅっちょーアプリ
</header>

<div class="container">

<div class="card">
📅 今日の予定
<div class="small">
名古屋出張
</div>
</div>

<div class="card">
🚄 新幹線
<div class="small">
時刻・予約番号
</div>
</div>

<div class="card">
🏨 ホテル
<div class="small">
アパホテル〈名古屋栄〉
</div>
</div>

<div class="card">
📍 イベント
<div class="small">
中日ビル
</div>
</div>

<div class="card">
🗺 地図
<div class="small">
Googleマップ
</div>
</div>

<div class="card">
🍜 ご飯
<div class="small">
ひつまぶし・味噌カツ
</div>
</div>

</div>

</body>
</html>
